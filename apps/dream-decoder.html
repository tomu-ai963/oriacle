<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dream Decoder AI — Oriacle</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ Oriacle</a>
  <button class="logout-btn" id="logout-btn">Logout</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">💤</span>
    <h1 class="app-title">Dream Decoder AI</h1>
    <p class="app-desc">Decode the subconscious and spiritual messages hidden in your dreams</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>Describe the dream you had</label>
      <textarea id="dream" placeholder="e.g. I was flying. Together with a large white bird, I flew above an unfamiliar city and saw a pillar of light..."></textarea>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">Decode My Dream</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ Spiritual Message from Your Dream</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const dream=document.getElementById("dream").value.trim();
  if(!dream){alert("Please enter the content of your dream");return;}
  const cd=document.getElementById("calc-display");
  cd.textContent=`Dream: ${dream.length>40?dream.slice(0,40)+"…":dream}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="Decoding your dream...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/dream-decoder",{dream});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="Error: "+e.message;}
  finally{btn.disabled=false;btn.textContent="Decode My Dream";}
});
</script>
</body>
</html>
