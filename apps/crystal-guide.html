<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Power Stone — Oriacle</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../app.html" class="logo">✦ Oriacle</a>
  <button class="logout-btn" id="logout-btn">Logout</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">💠</span>
    <h1 class="app-title">Power Stone</h1>
    <p class="app-desc">Identify the crystal that is most needed for your current state</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>Tell us how you're feeling or what's on your mind</label>
      <textarea id="current-state" placeholder="e.g. I've been feeling anxious lately. I feel drained from relationships and my energy feels low. I want the courage to start something new..."></textarea>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">Find My Guardian Stone</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ Crystal Message for You</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const currentState=document.getElementById("current-state").value.trim();
  if(!currentState){alert("Please enter your current state");return;}
  const cd=document.getElementById("calc-display");
  cd.textContent=`State: ${currentState.length>40?currentState.slice(0,40)+"…":currentState}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="Listening to the stone's voice...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/crystal-guide",{currentState});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="Error: "+e.message;}
  finally{btn.disabled=false;btn.textContent="Find My Guardian Stone";}
});
</script>
</body>
</html>
