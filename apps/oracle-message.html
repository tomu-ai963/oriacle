<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Oracle Message — Oriacle</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ Oriacle</a>
  <button class="logout-btn" id="logout-btn">Logout</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🌌</span>
    <h1 class="app-title">Oracle Message</h1>
    <p class="app-desc">Share your feelings with the universe and receive a mystical message in return</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>Tell us how you feel or what you're going through</label>
      <textarea id="feeling" placeholder="e.g. I'm wondering whether to start something new. I'm struggling with an important relationship..."></textarea>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">Send My Message to the Universe</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ Oracle from the Universe</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const feeling=document.getElementById("feeling").value.trim();
  if(!feeling){alert("Please enter how you feel");return;}
  const cd=document.getElementById("calc-display");
  cd.textContent=`Message: ${feeling.length>40?feeling.slice(0,40)+"…":feeling}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="Connecting to the universe...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/oracle-message",{feeling});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="Error: "+e.message;}
  finally{btn.disabled=false;btn.textContent="Send My Message to the Universe";}
});
</script>
</body>
</html>
