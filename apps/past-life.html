<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Past Life Reading — Oriacle</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ Oriacle</a>
  <button class="logout-btn" id="logout-btn">Logout</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🕯️</span>
    <h1 class="app-title">Past Life Reading</h1>
    <p class="app-desc">Decode the story of the past lives your soul has walked</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>What era or place are you intuitively drawn to?</label>
      <input type="text" id="q1" placeholder="e.g. Ancient Egypt, Medieval Europe, Heian Period Japan..."/>
    </div>
    <div class="field-group">
      <label>Recurring dreams or images (if any)</label>
      <input type="text" id="q2" placeholder="e.g. desert, a great palace, a seaside village..."/>
    </div>
    <div class="field-group">
      <label>Unexplained talents or strong emotions?</label>
      <input type="text" id="q3" placeholder="e.g. fear of water, a strong affinity for music..."/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;line-height:1.6;"></div>
    <button class="submit-btn" id="submit-btn">Open the Door to My Past Life</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ Past Life Memory</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const q1=document.getElementById("q1").value.trim();
  const q2=document.getElementById("q2").value.trim();
  const q3=document.getElementById("q3").value.trim();
  if(!q1){alert("Please answer the first question");return;}
  const cd=document.getElementById("calc-display");
  const lines=[`Drawn to: ${q1}`];
  if(q2)lines.push(`Recurring dream: ${q2}`);
  if(q3)lines.push(`Unexplained emotion: ${q3}`);
  cd.textContent=lines.join(" / ");cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="Reading the soul's memory...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/past-life",{answers:{q1,q2,q3}});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="Error: "+e.message;}
  finally{btn.disabled=false;btn.textContent="Open the Door to My Past Life";}
});
</script>
</body>
</html>
