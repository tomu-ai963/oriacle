<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nine Palace Reading — Oriacle</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ Oriacle</a>
  <button class="logout-btn" id="logout-btn">Logout</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🔲</span>
    <h1 class="app-title">Nine Palace Reading</h1>
    <p class="app-desc">Intuitively choose one of nine palaces and read the current flow of fortune</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>Date of Birth</label>
      <input type="date" id="birthdate"/>
    </div>
    <div class="field-group">
      <label>Intuitively choose one palace</label>
      <div class="palace-grid" id="palace-grid">
        <button class="palace-cell" data-palace="4 Green Wood Star (SE · Wind)"><span class="palace-num">4</span>SE · Wind<br>Growth</button>
        <button class="palace-cell" data-palace="9 Purple Fire Star (S · Fire)"><span class="palace-num">9</span>S · Fire<br>Honor</button>
        <button class="palace-cell" data-palace="2 Black Earth Star (SW · Earth)"><span class="palace-num">2</span>SW · Earth<br>Nurture</button>
        <button class="palace-cell" data-palace="3 Azure Wood Star (E · Thunder)"><span class="palace-num">3</span>E · Thunder<br>Action</button>
        <button class="palace-cell" data-palace="5 Yellow Earth Star (Center · Earth)"><span class="palace-num">5</span>Center · Earth<br>Transform</button>
        <button class="palace-cell" data-palace="7 Red Metal Star (W · Lake)"><span class="palace-num">7</span>W · Lake<br>Joy</button>
        <button class="palace-cell" data-palace="8 White Earth Star (NE · Mountain)"><span class="palace-num">8</span>NE · Mountain<br>Accumulate</button>
        <button class="palace-cell" data-palace="1 White Water Star (N · Water)"><span class="palace-num">1</span>N · Water<br>Wisdom</button>
        <button class="palace-cell" data-palace="6 White Metal Star (NW · Heaven)"><span class="palace-num">6</span>NW · Heaven<br>Leader</button>
      </div>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">Read the Palace Energy</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ Nine Palace Message</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
function getNineStarKi(b){const[y,m,d]=b.split('-').map(Number);const ay=(m===1||(m===2&&d<=3))?y-1:y;let s=String(ay).split('').reduce((a,c)=>a+parseInt(c),0);while(s>=10)s=String(s).split('').reduce((a,c)=>a+parseInt(c),0);const n=(11-s)%9||9;const names=['','1 White Water Star','2 Black Earth Star','3 Azure Wood Star','4 Green Wood Star','5 Yellow Earth Star','6 White Metal Star','7 Red Metal Star','8 White Earth Star','9 Purple Fire Star'];return{num:n,name:names[n]};}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});

let selected=null;
document.getElementById("palace-grid").querySelectorAll(".palace-cell").forEach(cell=>{
  cell.addEventListener("click",()=>{
    document.getElementById("palace-grid").querySelectorAll(".palace-cell").forEach(c=>c.classList.remove("selected"));
    cell.classList.add("selected");selected=cell.dataset.palace;
  });
});

document.getElementById("submit-btn").addEventListener("click",async()=>{
  const birthdate=document.getElementById("birthdate").value;
  if(!birthdate||!selected){alert("Please enter your date of birth and choose a palace");return;}
  const ki=getNineStarKi(birthdate);
  const cd=document.getElementById("calc-display");
  cd.textContent=`Birth Star: ${ki.name} (${ki.num}) / Selected: ${selected}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="Reading the flow of ki...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/nine-palace",{birthdate,selectedPalace:selected,honmeisei:ki.name,honmeiseiNum:ki.num});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="Error: "+e.message;}
  finally{btn.disabled=false;btn.textContent="Read the Palace Energy";}
});
</script>
</body>
</html>
