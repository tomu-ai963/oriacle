<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rune Reading — Oriacle</title>
<link rel="stylesheet" href="../mystic.css"/>
<script src="/mystic-system/common/header.js"></script>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ Oriacle</a>
  <button class="logout-btn" id="logout-btn">Logout</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">ᚱ</span>
    <h1 class="app-title">Rune Reading</h1>
    <p class="app-desc">The ancient Norse runes convey the will of the universe</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>Intuitively choose one rune</label>
      <div class="symbol-grid" id="rune-grid"></div>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">Receive the Rune's Message</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ The Rune's Oracle</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});

const RUNES=[
  ["ᚠ","Fehu"],["ᚢ","Uruz"],["ᚦ","Thurisaz"],["ᚨ","Ansuz"],["ᚱ","Raidho"],["ᚲ","Kenaz"],
  ["ᚷ","Gebo"],["ᚹ","Wunjo"],["ᚺ","Hagalaz"],["ᚾ","Nauthiz"],["ᛁ","Isa"],["ᛃ","Jera"],
  ["ᛇ","Eihwaz"],["ᛈ","Perthro"],["ᛉ","Algiz"],["ᛊ","Sowilo"],["ᛏ","Tiwaz"],["ᛒ","Berkana"],
  ["ᛖ","Ehwaz"],["ᛗ","Mannaz"],["ᛚ","Laguz"],["ᛜ","Ingwaz"],["ᛞ","Dagaz"],["ᛟ","Othala"]
];

let selected=null;
const grid=document.getElementById("rune-grid");
RUNES.forEach(([glyph,name])=>{
  const btn=document.createElement("button");
  btn.className="symbol-btn";
  btn.innerHTML=`<span class="symbol-glyph">${glyph}</span>${name}`;
  btn.addEventListener("click",()=>{
    grid.querySelectorAll(".symbol-btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");selected=`${glyph} (${name})`;
  });
  grid.appendChild(btn);
});

document.getElementById("submit-btn").addEventListener("click",async()=>{
  if(!selected){alert("Please choose a rune");return;}
  // Determine upright / reversed in JS
  const isReversed=Math.random()<0.3;
  const orientation=isReversed?'Reversed':'Upright';
  const cd=document.getElementById("calc-display");
  cd.textContent=`Selected Rune: ${selected} (${orientation})`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="Listening to the ancient voices...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/rune-reading",{rune:selected,orientation});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="Error: "+e.message;}
  finally{btn.disabled=false;btn.textContent="Receive the Rune's Message";}
});
</script>
</body>
</html>
